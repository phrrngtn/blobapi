# LLM provider reference data.
#
# Each entry defines a provider with its canonical slug (matching the
# prefix before "/" in model IDs like "anthropic/claude-opus-4-6"),
# display name, and a map of well-known URLs.
#
# Fetch pipeline for pricing scrapes:
#   1. Prepend "https://r.jina.ai/" to the pricing URL → clean markdown
#   2. Send Jina headers (target_selector, remove_selector) to narrow content
#   3. Pass markdown to llm_adapt('llm_model_cost') for structured extraction
#
# scrape_status: tested | untested | broken (reason)

# --- Tested and working ---

- provider: anthropic
  display_name: Anthropic
  scrape_status: tested
  jina:
    target_selector: table
    remove_selector: nav, footer, .sidebar
  urls:
    pricing: https://platform.claude.com/docs/en/about-claude/pricing
    models: https://api.anthropic.com/v1/models
    billing: https://console.anthropic.com/settings/billing
    docs: https://platform.claude.com/docs/en/api/getting-started

- provider: openai
  display_name: OpenAI
  scrape_status: tested
  jina:
    target_selector: table
  urls:
    pricing: https://platform.openai.com/docs/pricing
    models: https://api.openai.com/v1/models
    billing: https://platform.openai.com/usage
    docs: https://platform.openai.com/docs/api-reference

- provider: gemini
  display_name: Google Gemini
  scrape_status: tested
  jina:
    target_selector: table
  urls:
    pricing: https://ai.google.dev/pricing
    models: https://generativelanguage.googleapis.com/v1/models
    docs: https://ai.google.dev/gemini-api/docs

