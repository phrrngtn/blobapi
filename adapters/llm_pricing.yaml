# LLM model pricing reference data.
#
# Source: https://platform.claude.com/docs/en/about-claude/pricing
# Retrieved: 2026-03-17
#
# All prices are USD per million tokens (MTok).
#
# Cache multipliers (relative to base input):
#   5-minute cache write:  1.25x
#   1-hour cache write:    2x
#   cache read (hit):      0.1x
#
# Batch discount: 0.5x standard (both input and output).
#
# Special modifiers (not in this table, stack multiplicatively):
#   - Opus 4.6 fast mode:         6x standard ($30 / $150 MTok)
#   - Sonnet 4.5/4 long context:  >200k input = 2x input, 1.5x output
#   - US data residency:          1.1x all categories (Opus 4.6+)

