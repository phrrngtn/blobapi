# Adapters for weather/climate APIs.
#
# Each entry maps an OpenAPI operation (provider, api_name, path, method)
# to two JMESPath expressions:
#   call_jmespath:     context → {url, params}
#   response_jmespath: response body → common schema
#
# Context object available to call_jmespath:
#   {base_url, api_key, zip, lat, lng, start_date, end_date, ...}
#
# Common response schema (fact columns):
#   [{date, temperature, unit_of_measure}, ...]
#
# unit_of_measure values: 'C' (Celsius, SI default) or 'F' (Fahrenheit).
# We know the unit from the API documentation:
#   - VC: unitGroup='metric' → Celsius; unitGroup='us' → Fahrenheit
#   - OM: temperature_unit='celsius' → Celsius; temperature_unit='fahrenheit' → Fahrenheit
# The unit is a constant in the response_jmespath because it is determined
# by the fixed parameter values in the call_jmespath, not by the response data.
#
# jsoncons JMESPath dialect — use single quotes for string literals.

- provider: visualcrossing.com
  api_name: weather
  path: /VisualCrossingWebServices/rest/services/timeline/{location}/{startdate}/{enddate}
  method: get
  base_url: https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services
  vault_secret: visualcrossing

  call_jmespath: >-
    {url: join('/', [base_url, 'timeline', zip, start_date, end_date]),
     params: {key: api_key,
     unitGroup: 'metric',
     include: 'days', contentType: 'json'}}
  call_notes: >-
    Location in URL path. unitGroup='metric' returns Celsius (SI).
    API key via query param. No timezone — UTC day boundaries.

  response_jmespath: >-
    days[].{date: datetime, temperature: temp, unit_of_measure: 'C'}
  response_notes: >-
    Response is {days: [{datetime, temp, ...}]}. unit_of_measure='C'
    because unitGroup='metric' is set in call_jmespath. The unit is
    known from VC API docs, not from the response data itself.

- provider: open-meteo.com
  api_name: archive
  path: /v1/archive
  method: get
  base_url: https://archive-api.open-meteo.com/v1
  vault_secret: openmeteo

  call_jmespath: >-
    {url: join('/', [base_url, 'archive']),
     params: {latitude: lat, longitude: lng,
     start_date: start_date, end_date: end_date,
     daily: 'temperature_2m_mean',
     temperature_unit: 'celsius'}}
  call_notes: >-
    All params as query params. No API key needed.
    temperature_unit='celsius' for SI. Timezone omitted — defaults
    to UTC.

  response_jmespath: >-
    zip_arrays(daily)[].{date: time, temperature: temperature_2m_mean, unit_of_measure: 'C'}
  response_notes: >-
    Parallel arrays transposed via zip_arrays. unit_of_measure='C'
    because temperature_unit='celsius' is set in call_jmespath.
    Known from Open-Meteo API docs.
